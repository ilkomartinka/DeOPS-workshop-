name: Weather Report

on: 
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy: 
      matrix:
        city: [London, Prague, New_York, Tokyo]
     
    steps: 
      - name: Fetch weather 
        run: | 
          CITY="${{ matrix.city }}"
          CITY_FORMATTED=$(echo "$CITY" | sed 's/_/ /g')

          WEATHER=$(curl -s "wttr.in/$CITY_FORMATTED?format=3")
          echo "Weather in $CITY_FORMATTED: $WEATHER"

          echo "## $CITY_FORMATTED Weather" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$WEATHER**" >> $GITHUB_STEP_SUMMARY

          echo "$CITY_FORMATTED: $WEATHER" >> weather.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-${{ matrix.city }}
          path: weather.txt