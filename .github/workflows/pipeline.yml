name: Weather Report

on: 
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy: 
      matrix:
        city: [London, Prague, New_York, Tokyo] # New_York místo "New York"
     
    steps: 
      - name: Fetch weather 
        run: | 
          CITY="${{ matrix.city }}"
          
          # nahradíme podtržítko mezerou pro API
          CITY_FORMATTED=$(echo "$CITY" | sed 's/_/ /g')
          
          # URL encoding mezer
          CITY_ENCODED=$(echo "$CITY_FORMATTED" | sed 's/ /%20/g')

          WEATHER=$(curl -s "wttr.in/$CITY_ENCODED?format=3")
          echo "Weather in $CITY_FORMATTED: $WEATHER"

          # GitHub Step Summary
          echo "## $CITY_FORMATTED Weather" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$WEATHER**" >> $GITHUB_STEP_SUMMARY

          # Soubor pro artifact
          echo "$CITY_FORMATTED: $WEATHER" >> weather.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-${{ matrix.city }}
          path: weather.txt